<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shield Pro - Gatekeeper</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    #login-screen, #app-content { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
    input { padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; font-size: 16px; }
    button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:hover { background: #2563eb; }
    #error-message { color: #ef4444; margin-top: 15px; min-height: 20px; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2>Enter Your License Key 🛡️</h2>
    <input type="text" id="license-input" placeholder="ADITYA-PRO-..." />
    <br>
    <button onclick="checkKey()">Unlock App</button>
    <p id="error-message"></p>
  </div>

  <div id="app-content" style="display: none;">
    <h2>Welcome to Shield Pro! ✅</h2>
    <p>Your secure data environment is now activated and running.</p>
    </div>

  <script>
    // 1. Give the browser the map to your database
    // IMPORTANT: Use your PUBLIC ANON KEY here, NEVER your secret role key!
    const supabaseUrl = 'YOUR_SUPABASE_URL_HERE';
    const supabaseAnonKey = 'YOUR_SUPABASE_ANON_KEY_HERE';
    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    // 2. Check if they already unlocked it yesterday
    window.onload = function() {
      const savedKey = localStorage.getItem('shield_pro_key');
      if (savedKey) {
        verifyKey(savedKey);
      }
    };

    // 3. The Bouncer: Reads the input box
    async function checkKey() {
      const inputKey = document.getElementById('license-input').value.trim();
      if (!inputKey) return;
      document.getElementById('error-message').innerText = "Checking...";
      await verifyKey(inputKey);
    }

    // 4. Look inside the Supabase database
    async function verifyKey(key) {
      const { data, error } = await supabase
        .from('license_keys')
        .select('*')
        .eq('key_string', key)
        .eq('is_active', true)
        .single();

      if (data) {
        // VIP List Confirmed: Unlock the app
        localStorage.setItem('shield_pro_key', key);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
      } else {
        // Fake or Expired Key
        document.getElementById('error-message').innerText = "Invalid or expired license key.";
        localStorage.removeItem('shield_pro_key');
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('app-content').style.display = 'none';
      }
    }
  </script>
</body>
</html>
