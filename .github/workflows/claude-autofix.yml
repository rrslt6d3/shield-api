name: Claude Code Auto-Fix

# ============================================================================
# Claude Code Auto-Fix PR Workflow
# Automatically triggers Claude to watch PRs and fix CI failures + review comments
# Requires: Claude GitHub App installed (https://github.com/apps/claude)
# ============================================================================

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

  # Allow manual trigger to enable auto-fix on any PR
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to enable auto-fix on'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ── Step 1: Validate PR and run initial checks ──────────────────────────
  validate-pr:
    name: Validate & Label PR
    runs-on: ubuntu-latest
    outputs:
      should_autofix: ${{ steps.check.outputs.should_autofix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if auto-fix enabled
        id: check
        run: |
          # Auto-fix is enabled by default on all PRs
          # Skip if PR title contains [no-autofix]
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ "$PR_TITLE" == *"[no-autofix]"* ]]; then
            echo "should_autofix=false" >> $GITHUB_OUTPUT
            echo "Auto-fix disabled via PR title"
          else
            echo "should_autofix=true" >> $GITHUB_OUTPUT
            echo "Auto-fix enabled"
          fi

      - name: Add auto-fix label
        if: steps.check.outputs.should_autofix == 'true'
        run: |
          gh pr edit ${{ github.event.pull_request.number || github.event.inputs.pr_number }} \
            --add-label "claude-autofix" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: Type check ────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: validate-pr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true
        id: tsc

      - name: Report TypeScript errors
        if: steps.tsc.outcome == 'failure'
        run: |
          echo "::warning::TypeScript errors detected — Claude auto-fix will attempt to resolve"
          echo "TSC_FAILED=true" >> $GITHUB_ENV

  # ── Step 3: Lint check ────────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: validate-pr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint
        continue-on-error: true
        id: lint

      - name: Report lint errors
        if: steps.lint.outcome == 'failure'
        run: |
          echo "::warning::Lint errors detected — Claude auto-fix will attempt to resolve"

  # ── Step 4: Build check ───────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

  # ── Step 5: Pricing consistency ───────────────────────────────────────
  pricing-check:
    name: Pricing Consistency
    runs-on: ubuntu-latest
    needs: validate-pr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check pricing consistency
        run: npx tsx tests/pricing-consistency.test.ts 2>/dev/null || echo "No pricing tests found"

  # ── Step 6: Security scan ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate-pr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Scan for common secret patterns
          FOUND=0
          for pattern in "SUPABASE_SERVICE_ROLE_KEY=" "sk-" "password=" "secret="; do
            if grep -rn "$pattern" src/ --include="*.ts" --include="*.tsx" --include="*.js" | grep -v ".env" | grep -v "node_modules" | grep -v "example" | head -5; then
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::warning::Potential secrets detected in source code"
          fi

      - name: Check for console.log in API routes
        run: |
          if grep -rn "console\.log" src/app/api/ --include="*.ts" | grep -v "safe-logger" | head -10; then
            echo "::warning::console.log found in API routes — use safe-logger instead"
          fi

  # ── Step 7: Post summary comment ──────────────────────────────────────
  summary:
    name: Auto-Fix Summary
    runs-on: ubuntu-latest
    needs: [build, pricing-check, security]
    if: always()
    steps:
      - name: Post CI summary
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const failed = checks.check_runs.filter(c =>
              c.conclusion === 'failure' && c.name !== 'Auto-Fix Summary'
            );

            if (failed.length > 0) {
              const failList = failed.map(f => `- ❌ **${f.name}**`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🤖 Claude Auto-Fix Status\n\nCI checks with failures:\n${failList}\n\n**Auto-fix is watching this PR.** Claude will investigate failures and push fixes automatically.\n\n> To disable: add \`[no-autofix]\` to the PR title\n> To manually trigger: paste this PR URL into [claude.ai/code](https://claude.ai/code) and say "auto-fix this PR"`
              });
            }
